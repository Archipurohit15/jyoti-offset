{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="quote-hero">
  <div class="quote-hero-tag">Get a Quote</div>
  <h1>Tell us what to print.<br/>Get a price on <span>WhatsApp.</span></h1>
</div>

<div class="quote-form-section">
  <div class="quote-form-box">
    <h2>Request a free quote</h2>
    <p class="sub">Fill this in and we'll open WhatsApp with your details pre-filled.</p>

    <div class="form-row">
      <div class="form-group">
        <label>Your Name <span>*</span></label>
        <input type="text" id="q-name" placeholder="e.g. Rahul Sharma"/>
      </div>
      <div class="form-group">
        <label>Phone <span>*</span></label>
        <input type="text" id="q-phone" placeholder="10-digit mobile"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="q-email" placeholder="optional"/>
      </div>
      <div class="form-group">
        <label>Service <span>*</span></label>
        <select id="q-service">
          <option value="">Select a service</option>
          <option>Visiting Cards</option>
          <option>Banners & Flex</option>
          <option>Wedding Invitations</option>
          <option>Standees & Brochures</option>
          <option>Glow Boards</option>
          <option>Letterheads</option>
          <option>Registers</option>
          <option>Hotel Menus</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Quantity</label>
        <input type="text" id="q-quantity" placeholder="e.g. 500 pieces"/>
      </div>
      <div class="form-group">
        <label>Size / Finish</label>
        <input type="text" id="q-size" placeholder="e.g. A4, matte lamination"/>
      </div>
    </div>

    <div class="form-group">
      <label>Any other requirements?</label>
      <textarea id="q-message" placeholder="Deadline, design help needed, special finish..."></textarea>
    </div>

    <button class="submit-btn" onclick="sendQuote()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.531 5.845L.057 23.273a.5.5 0 00.671.632l5.701-1.877A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.947 0-3.764-.5-5.35-1.376l-.361-.207-3.735 1.23 1.137-3.643-.228-.374A9.944 9.944 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      Send on WhatsApp
    </button>
  </div>
</div>

<script>
function sendQuote() {
  const name = document.getElementById('q-name').value;
  const phone = document.getElementById('q-phone').value;
  const email = document.getElementById('q-email').value;
  const service = document.getElementById('q-service').value;
  const quantity = document.getElementById('q-quantity').value;
  const size = document.getElementById('q-size').value;
  const message = document.getElementById('q-message').value;

  if (!name || !phone || !service) {
    alert('Please fill in name, phone and service.');
    return;
  }

  const text = `Hi Jyoti Offset! 👋 I need a quote.

*Name:* ${name}
*Phone:* ${phone}
*Email:* ${email || 'Not provided'}
*Service:* ${service}
*Quantity:* ${quantity || 'Not specified'}
*Size/Finish:* ${size || 'Not specified'}
*Requirements:* ${message || 'None'}`;

  window.open(`https://wa.me/919414269301?text=${encodeURIComponent(text)}`, '_blank');
}
</script>

{% endblock %}
